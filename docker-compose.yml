services:
  postgres:
    image: postgres:16
    container_name: lmpdf-postgres
    environment:
      POSTGRES_DB: lmpdf
      POSTGRES_USER: lmpdf
      POSTGRES_PASSWORD: lmpdf
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - ./infra/postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lmpdf-redis
    ports:
      - '127.0.0.1:6379:6379'

  garage:
    image: dxflrs/garage:v1.0.1
    container_name: lmpdf-garage
    ports:
      - '127.0.0.1:3900:3900'   # S3 API (local only)
      - '127.0.0.1:3902:3902'   # Web/API admin (local only)
      - '127.0.0.1:3903:3903'   # Admin RPC (local only)
    volumes:
      - ./infra/garage-data:/var/lib/garage/data
      - ./infra/garage-meta:/var/lib/garage/meta
      - ./infra/garage.toml:/etc/garage.toml:ro

  backend:
    build: ./apps/api
    container_name: lmpdf-backend
    volumes:
      - uploads-data:/app/uploads
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://lmpdf:lmpdf@postgres:5432/lmpdf
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      VISION_URL: http://vision:8001
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4173,http://localhost:5173,http://localhost:3000}
      STRICT_CORS: ${STRICT_CORS:-true}
      ALLOW_SELF_REGISTER: ${ALLOW_SELF_REGISTER:-false}
      S3_ENDPOINT: http://garage:3900
      S3_ACCESS_KEY: ${GARAGE_ACCESS_KEY:-GKlmpdf0000000000000}
      S3_SECRET_KEY: ${GARAGE_SECRET_KEY:-lmpdf-secret-key-change-me-in-prod}
      S3_BUCKET: lmpdf
      S3_REGION: garage
      S3_FORCE_PATH_STYLE: 'true'
      # LDAP / Active Directory (optionnel)
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_URL: ${LDAP_URL:-}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_SEARCH_BASE: ${LDAP_SEARCH_BASE:-}
      LDAP_SEARCH_FILTER: ${LDAP_SEARCH_FILTER:-(sAMAccountName={{username}})}
      LDAP_ADMIN_GROUP: ${LDAP_ADMIN_GROUP:-}
      LDAP_EDITOR_GROUP: ${LDAP_EDITOR_GROUP:-}
      LDAP_INSECURE_TLS: ${LDAP_INSECURE_TLS:-false}
      # MFA TOTP encryption key (AES-256-GCM, 64 hex chars)
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-}
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
      - garage

  frontend:
    build: ./apps/web
    container_name: lmpdf-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    ports:
      - '4173:4173'
    depends_on:
      - backend

  vision:
    build: ./apps/vision
    container_name: lmpdf-vision
    environment:
      PYTHONUNBUFFERED: '1'
      UPLOADS_DIR: /uploads
    expose:
      - '8001'
    volumes:
      - uploads-data:/uploads


volumes:
  uploads-data:
